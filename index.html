<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f5ecec; /* soft warm nude */
height:100vh;
overflow:hidden;
}

#app{
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.card{
position:absolute;
width:90%;
max-width:420px;
max-height:90vh;
overflow:auto;
background:#ffffff;
border-radius:26px;
padding:40px 32px;
text-align:center;
box-shadow:0 30px 70px rgba(80,0,20,.18); /* maroon shadow */
opacity:0;
transform:scale(.94) translateY(40px);
transition:.7s cubic-bezier(.19,1,.22,1);
pointer-events:none;
}

.card::-webkit-scrollbar{width:6px}
.card::-webkit-scrollbar-thumb{background:#7a1e2c;border-radius:10px}

.card.active{
opacity:1;
transform:scale(1) translateY(0);
pointer-events:auto;
}

h1,h2{
font-family:'DM Serif Display',serif;
margin:0 0 14px;
color:#6d0f1a;
}

p{font-size:15px;line-height:1.7;opacity:.85;color:#4a2a2e}

button{
padding:12px 26px;
border:none;
border-radius:999px;
background:#7a1e2c; /* maroon utama */
color:white;
cursor:pointer;
margin-top:18px;
font-size:15px;
transition:.25s;
}
button:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(122,30,44,.4);
}

/* PIN */
.pin-display{
display:flex;
justify-content:center;
gap:12px;
margin:25px 0;
}
.dot{
width:18px;
height:18px;
border-radius:50%;
border:2px solid #7a1e2c;
}
.dot.fill{background:#7a1e2c}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}
.keypad button{
padding:16px;
font-size:18px;
border-radius:14px;
}

/* GAME */
#options{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}
#options button{
background:#f5ecec;
border:1px solid #7a1e2c;
color:#6d0f1a;
}

.score-box{
margin-top:22px;
font-size:15px;
letter-spacing:.5px;
color:#6d0f1a;
}

#feedback{
margin-top:14px;
min-height:22px;
font-size:14px;
transition:.3s;
}

/* Correct / Wrong tetap lembut */
.correctAnim{
animation:pop .4s ease;
background:#d4f3e2 !important;
border-color:#9de0c0 !important;
}
@keyframes pop{
0%{transform:scale(.9)}
60%{transform:scale(1.08)}
100%{transform:scale(1)}
}

.wrongAnim{
animation:shake .4s;
background:#ffe0e0 !important;
border-color:#ffb3b3 !important;
}

@keyframes shake{
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-4px)}
}

/* TIMER */
.lovebox{
background:linear-gradient(145deg,#ffffff,#f3d6da);
border-radius:22px;
padding:20px;
margin-bottom:25px;
box-shadow:0 12px 35px rgba(122,30,44,.25);
border:1px solid rgba(122,30,44,.25);
}

.timer-title{
font-size:12px;
letter-spacing:2px;
opacity:.6;
color:#6d0f1a;
}

.timer-display{
font-family:'DM Serif Display',serif;
font-size:28px;
margin-top:8px;
color:#7a1e2c;
letter-spacing:1px;
animation:pulse 2.5s infinite;
}
@keyframes pulse{50%{opacity:.5}}

/* MEDIA */
.reveal-box{
margin:20px 0;
aspect-ratio:16/9;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
border:2px dashed #7a1e2c;
cursor:pointer;
background:#fff5f6;
transition:.3s;
}
.reveal-box:hover{transform:scale(1.02)}

/* LETTER FINAL */
.letter{
margin-top:22px;
font-family:'Cormorant Garamond',serif;
font-size:18px;
line-height:1.3;
letter-spacing:.4px;
text-align:left;
color:#3a1b1f;
opacity:.95;
min-height:100px;
animation:fadeInText 1.2s ease;
}

.signature{
margin-top:32px;
text-align:right;
font-family:'Playfair Display',serif;
font-size:20px;
letter-spacing:1px;
color:#7a1e2c;
animation:fadeInText 1.8s ease;
}

@keyframes fadeInText{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* HEART BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-1;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confettiCanvas"></canvas>

   <audio id="bgm" src="song.mp3" loop></audio>
   
<div id="app">

<!-- welcome -->
<section class="card active">
<h1>Hi, birthday girl! </h1>
<p>You got some letters.<br>But you have to unlock it.</p>
<button onclick="next()">Unlock</button>
</section>

<!-- pin -->
<section class="card">
<h2>Enter the code 🔐</h2>
<div class="pin-display" id="pin"></div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPin()">⌫</button>
<button onclick="press(0)">0</button>
<button onclick="checkPin()">✔</button>
</div>
</section>

<!-- quiz -->
<section class="card">
<h2 id="question">Little game 🎮</h2>
<p>Answer correctly to earn points</p>
<div id="options"></div>

<div class="score-box">
Points: <span id="score">0</span> / 3
</div>

<p id="feedback"></p>
</section>

<!-- final -->
<section class="card">

<h1>A's day!</h1>

<div class="lovebox">
<div class="timer-title">TIME WITH YOU</div>
<div id="loveTimer" class="timer-display">loading...</div>
</div>

<div class="reveal-box" onclick="revealMemory(this)">
Tap to reveal our memory
</div>

<div id="letter" class="letter"></div>
<div id="sign" class="signature"></div>

</section>

</div>

<script>

/* =================================================
   SLIDE NAVIGATION
================================================= */

const cards=document.querySelectorAll('.card');
let page=0;
const music=document.getElementById("bgm");
music.volume=0.4;
let musicStarted=false;

function show(){
cards.forEach(c=>c.classList.remove('active'));
cards[page].classList.add('active');
if(page===3)startTimer();
}

function next(){
page++;

if(page===1 && !musicStarted){
music.play();
musicStarted=true;
}

show();
if(page===2)loadQuestion();
}


/* =================================================
   PIN SYSTEM
================================================= */

let pinInput = '';
const correctPin = '0704';
const pinDisplay = document.getElementById("pin");

function renderDots(){
    pinDisplay.innerHTML = '';

    for(let i=0;i<4;i++){
        const d = document.createElement("div");
        d.className = "dot" + (i < pinInput.length ? " fill" : "");
        pinDisplay.appendChild(d);
    }
}

renderDots();

function press(n){
    if(pinInput.length < 4){
        pinInput += n;
        renderDots();
    }
}

function clearPin(){
    pinInput = pinInput.slice(0,-1);
    renderDots();
}

function checkPin(){
    if(pinInput === correctPin){
        next();
    }else{
        pinDisplay.classList.add('shake');

        setTimeout(()=>{
            pinDisplay.classList.remove('shake');
        },400);

        pinInput = '';
        renderDots();
    }
}


/* =================================================
   QUIZ SYSTEM
================================================= */

const questions=[
{q:"Today's date?", options:["14 February 2026","07 May 2026","22 January 2025"],correct:1},
{q:"Is it someone's special day?", options:["Yes! :3","i don't know","maybe no?"],correct:0},
{q:"Who that person might be? ", options:["idgaf","Someone else","It's.. me?"],correct:2}
];

let currentQ = 0;
let score = 0;

const scoreEl = document.getElementById("score");
const question = document.getElementById("question");
const options = document.getElementById("options");
const feedback = document.getElementById("feedback");


function loadQuestion(){

    const q = questions[currentQ];

    question.textContent = q.q;
    options.innerHTML = "";
    feedback.textContent = "";

    q.options.forEach((opt,i)=>{
        const b = document.createElement("button");
        b.textContent = opt;
        b.onclick = () => checkAnswer(i,b);
        options.appendChild(b);
    });
}


function checkAnswer(i,btn){

    const q = questions[currentQ];

    if(i === q.correct){

        score++;
        scoreEl.textContent = score;

        btn.classList.add("correctAnim");
        feedback.textContent = "Correct🤍";

        setTimeout(()=>{
            currentQ++;

            if(currentQ < questions.length){
                loadQuestion();
            }else{
                next();
            }
        },900);

    }else{

        btn.classList.add("wrongAnim");
        feedback.textContent = "Oh no, Try again!";
    }
}


/* =================================================
   RELATIONSHIP TIMER
================================================= */

function startTimer(){

    const start = new Date("2026-05-07T00:00:00");

    setInterval(()=>{

        const diff = new Date() - start;

        const d = Math.floor(diff / 86400000);
        const h = Math.floor(diff / 3600000) % 24;
        const m = Math.floor(diff / 60000) % 60;
        const s = Math.floor(diff / 1000) % 60;

        loveTimer.textContent = `${d} days ${h}h ${m}m ${s}s`;

    },1000);
}


/* =================================================
   MEMORY REVEAL + TYPING LETTER
================================================= */

let alreadyRevealed = false;

function revealMemory(el){

    if(alreadyRevealed) return;
    alreadyRevealed = true;

    el.innerHTML = `
        <img src="pict.jpg"
        style="width:100%;height:100%;object-fit:cover;border-radius:18px">
    `;

    const text = `
        To my beloved one, my forever soulmate, Adis.
        
        Happy Birthday! On your special day, let me convey my best saying and prayers for you :3. The years you have gone through previously have given you so many experiences, from joys until sorrows, and that things is what will be the provision to shape you into the best version of yourself. My prayer for you, may in your new age, may you be fulfilled with success in every step you take, health that is always maintained, and surrounded by people who always love you (like me :p). May God soon grant all your dreams, aspirations, and hopes. May you always find happiness in every journey of your life. May this year be your best year. And may the next days, your smiles shining brightly just like always.
        
        Just know, I'm truly impressed by everything you have been through in your life. Starting from you who have successfully passed difficult times that once seemed impossible to overcome. Until you who have managed to overcome all the obstacles and barriers that had time hit your life so far. Really, that things is truly an achievement that is very much worthy of appreciation. And I hope this year, there are no more hard times or obstacles that you have to go through. Instead, may your life this year always be blessed with many good things without stopping. I hope, today will be one of the beautiful days that you will always remember in the heart. And I hope, on this day you will be enveloped by much love and affection from all the inhabitants of the earth. Lastly, please know, I love you to the moon and back, in every lifetimes. Happy birthday, beautiful soul <3!
      `;

    const paragraphs = text.trim().split(/\n\s*\n/);

    const letter = document.getElementById("letter");
    const sign = document.getElementById("sign");

    if(!letter || !sign) return console.error("Letter or Sign element missing");

    let p=0;
    let i=0;

    function typeParagraph(){

        if(p>=paragraphs.length){
            sign.innerHTML="Sincerely<br> Me";
            return;
        }

        const para=document.createElement("p");
        letter.appendChild(para);

        const typing=setInterval(()=>{
            para.innerHTML+=paragraphs[p].charAt(i);
            i++;

            if(i>=paragraphs[p].length){
                clearInterval(typing);
                p++;
                i=0;
                setTimeout(typeParagraph,350);
            }

        },30);
    }

    typeParagraph();
}


/* =================================================
   FLOATING HEARTS BACKGROUND
================================================= */

const canvas = document.getElementById("confettiCanvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let hearts = [];

for(let i=0;i<140;i++){
    hearts.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        s: Math.random()*6+2,
        v: Math.random()*0.6+0.2
    });
}

function heart(x,y,s){

    ctx.beginPath();

    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x,y-s,x-s,y-s,x-s,y);
    ctx.bezierCurveTo(x-s,y+s,x,y+s*1.4,x,y+s*1.8);
    ctx.bezierCurveTo(x,y+s*1.4,x+s,y+s,x+s,y);
    ctx.bezierCurveTo(x+s,y-s,x,y-s,x,y);

    ctx.fill();
}


function anim(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "rgba(232,180,188,0.35)";

    hearts.forEach(h=>{
        heart(h.x,h.y,h.s);

        h.y += h.v;

        if(h.y > canvas.height){
            h.y = -90;
            h.x = Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(anim);
}

anim();

</script>

</body>
</html>
